version: "3.9"

# ═══════════════════════════════════════════════════════════════
# MR AI RAG v2 — Docker Compose
# ═══════════════════════════════════════════════════════════════
# Usage:
#   cp .env.example .env        ← fill in your API keys
#   docker compose up -d        ← start
#   docker compose down         ← stop
#   docker compose logs -f      ← view logs
# ═══════════════════════════════════════════════════════════════

services:

  # ── Main RAG App ─────────────────────────────────────────────
  mr-ai-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mr-ai-rag
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"

    # ── Environment (override via .env file) ──────────────────
    environment:
      # App
      - APP_NAME=${APP_NAME:-MR AI RAG}
      - APP_VERSION=2.0.0
      - DEBUG=${DEBUG:-false}
      - PORT=8000

      # LLM Providers (set the ones you use)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}

      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}

      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-haiku-20241022}

      - HF_API_KEY=${HF_API_KEY:-}
      - HF_MODEL_ID=${HF_MODEL_ID:-mistralai/Mistral-7B-Instruct-v0.2}

      # Ollama (point to another container or host machine)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}

      # Embedding (local, no key needed)
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - EMBEDDING_DIMENSION=384

      # Chunking
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=100
      - TOP_K_RESULTS=5

    # ── Persistent storage ────────────────────────────────────
    volumes:
      - rag_uploads:/app/uploads
      - rag_vector_store:/app/vector_store

    # ── Resource limits ───────────────────────────────────────
    # Adjust based on your server. Whisper needs more RAM.
    deploy:
      resources:
        limits:
          memory: 4G          # increase to 8G if using whisper-medium/large
        reservations:
          memory: 1G

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - ragnet

  # ── Ollama (optional — local LLM) ────────────────────────────
  # Uncomment this block to run Ollama alongside the app.
  # After starting: docker exec -it ollama ollama pull llama3

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   networks:
  #     - ragnet
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 8G

  # ── Nginx reverse proxy (optional — for domain + HTTPS) ──────
  # Uncomment and set your domain in nginx/default.conf

  # nginx:
  #   image: nginx:alpine
  #   container_name: nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./nginx/certs:/etc/nginx/certs:ro        # for HTTPS
  #   depends_on:
  #     - mr-ai-rag
  #   networks:
  #     - ragnet

# ── Named Volumes (data survives container restarts) ───────────
volumes:
  rag_uploads:
    driver: local
  rag_vector_store:
    driver: local
  # ollama_models:
  #   driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  ragnet:
    driver: bridge