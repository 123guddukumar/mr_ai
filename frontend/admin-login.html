<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MR AI RAG — Admin Login</title>
  <meta name="description" content="Admin portal login for MR AI RAG platform.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #080a12;
      --bg2: #0e1121;
      --card: #14172b;
      --border: #1e2340;
      --accent: #ff7a00;
      --accent-dark: #cc6200;
      --text: #f8fafc;
      --text2: #94a3b8;
      --text3: #475569;
      --red: #ef4444;
      --green: #10b981;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --bg2: #ffffff;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 10% 10%, rgba(255, 122, 0, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(255, 122, 0, 0.03) 0%, transparent 40%);
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-box {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 10px 30px rgba(255, 122, 0, 0.3);
    }

    .title {
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .sub {
      text-align: center;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text3);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input {
      width: 100%;
      height: 52px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0 16px;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 122, 0, 0.1);
    }

    .login-btn {
      width: 100%;
      height: 52px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s;
    }

    .login-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 122, 0, 0.2);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      font-size: 13px;
      font-weight: 600;
      padding: 12px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
      text-align: center;
    }

    .result.error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .result.success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 13px;
      color: var(--text3);
    }

    .footer a {
      color: var(--text2);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-box">🛡️</div>
    <h1 class="title">Admin Login</h1>
    <p class="sub">Access the restricted VectorizeAI control panel</p>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-input" id="username" placeholder="Enter admin username" autocomplete="username" autofocus>
    </div>
    
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In to Dashboard</button>
    <div class="result" id="result"></div>

    <div class="footer">
      <a href="/">← Return to Home</a>
      <span style="margin: 0 10px; opacity: 0.3">|</span>
      <a href="/login">Client Access</a>
    </div>
  </div>

  <script>
    // Theme Management
    function initTheme() {
      const theme = localStorage.getItem('mrairag_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    }
    initTheme();

    // Already logged in?
    (function(){
      const s = localStorage.getItem('mrairag_admin');
      if(s){
        try {
          const d = JSON.parse(s);
          if(d?.token) window.location.href='/admin';
        } catch(e){}
      }
    })();

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        return showResult('error', 'Please enter both username and password.');
      }
      
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      
      try {
        const r = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const d = await r.json();
        
        if (r.ok) {
          localStorage.setItem('mrairag_admin', JSON.stringify({
            token: d.token,
            username: d.username,
            is_super: d.is_super
          }));
          showResult('success', 'Authentication successful! Redirecting...');
          
          // Redirect based on role
          if (d.is_super) {
            setTimeout(() => window.location.href = '/super-admin', 800);
          } else {
            setTimeout(() => window.location.href = '/admin', 800);
          }
        } else {
          showResult('error', d.detail || 'Invalid credentials. Please try again.');
        }
      } catch (e) {
        showResult('error', 'Network error. Please check your connection.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In to Dashboard';
      }
    }

    function showResult(type, msg) {
      const el = document.getElementById('result');
      el.className = 'result ' + type;
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
