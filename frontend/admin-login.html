<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MR AI RAG — Admin Login</title>
<meta name="description" content="Admin portal login for MR AI RAG platform.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a12;--bg2:#0e1121;--card:#14172b;--border:#1e2340;
  --accent:#f59e0b;--accent2:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --green:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background-image:radial-gradient(ellipse at 30% 40%,rgba(245,158,11,.06) 0%,transparent 60%),
                   radial-gradient(ellipse at 70% 80%,rgba(239,68,68,.04) 0%,transparent 50%);}

.card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:34px 30px;box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:fadein .4s ease}
@keyframes fadein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.shield{width:48px;height:48px;border-radius:12px;margin:0 auto 16px;
  background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;
  align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 6px 24px rgba(245,158,11,.3)}
.title{text-align:center;font-size:19px;font-weight:800;margin-bottom:3px}
.sub{text-align:center;font-size:11px;color:var(--text3);margin-bottom:24px}
.badge{display:inline-block;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
  color:#fbbf24;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.06em;
  text-transform:uppercase;margin-left:5px}

.form-label{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.form-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);color:var(--text);
  padding:10px 12px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.form-group{margin-bottom:13px}

.login-btn{width:100%;padding:11px;border-radius:9px;border:none;cursor:pointer;margin-top:6px;
  background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:800;transition:all .2s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,158,11,.35)}
.login-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

.result{font-size:11px;padding:8px 11px;border-radius:7px;margin-top:10px;display:none;line-height:1.5}
.result.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.result.success{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);color:var(--green)}

.footer{text-align:center;margin-top:18px;font-size:10px;color:var(--text3)}
.footer a{color:var(--text3);text-decoration:none}
.footer a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="card">
  <div class="shield">🛡️</div>
  <div class="title">Admin Portal <span class="badge">Restricted</span></div>
  <div class="sub">MR AI RAG · Admin Access Only</div>

  <div class="form-group">
    <label class="form-label">Username</label>
    <input type="text" class="form-input" id="username" placeholder="admin" autocomplete="username" autofocus>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>

  <button class="login-btn" id="login-btn" onclick="doLogin()">🛡️ Admin Sign In</button>
  <div class="result" id="result"></div>

  <div class="footer" style="margin-top:20px">
    <a href="/">← Back to App</a> &nbsp;·&nbsp; <a href="/login">Client Login</a>
  </div>
</div>

<script>
// Redirect if already admin-logged in
(function(){
  const s = localStorage.getItem('mrairag_admin');
  if(s){ try{ const d=JSON.parse(s); if(d?.token) window.location.href='/admin'; }catch{} }
})();

async function doLogin(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  if(!username||!password) return showResult('error','⚠ Fill in username and password.');
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='Authenticating…';
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})});
    const d=await r.json();
    if(r.ok){
      localStorage.setItem('mrairag_admin',JSON.stringify({token:d.token,username:d.username}));
      showResult('success','✅ '+d.message+' Redirecting…');
      setTimeout(()=>window.location.href='/admin',800);
    }else{
      showResult('error','❌ '+(d.detail||'Login failed'));
    }
  }catch(e){ showResult('error','❌ Network error: '+e.message); }
  finally{ btn.disabled=false;btn.textContent='🛡️ Admin Sign In'; }
}

function showResult(cls,msg){
  const el=document.getElementById('result');
  el.className='result '+cls;el.textContent=msg;el.style.display='block';
}
</script>
</body>
</html>
