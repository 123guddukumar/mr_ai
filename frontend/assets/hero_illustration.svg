<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Glow -->
  <circle cx="300" cy="250" r="200" fill="url(#paint0_radial)" fill-opacity="0.2"/>
  
  <!-- Central Brain/Core -->
  <g id="core">
    <rect x="250" y="200" width="100" height="100" rx="20" fill="#FF7A00"/>
    <path d="M280 230L300 270L320 230" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="300" cy="250" r="40" stroke="white" stroke-width="2" stroke-dasharray="4 4">
      <animateTransform attributeName="transform" type="rotate" from="0 300 250" to="360 300 250" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data Points -->
  <g id="points">
    <circle cx="150" cy="150" r="8" fill="#FF7A00">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="450" cy="150" r="8" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="150" cy="350" r="8" fill="#FF7A00">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="450" cy="350" r="8" fill="#FF7A00">
      <animate attributeName="opacity" values="1;0.3;1" dur="3.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Connecting Lines -->
  <g id="lines" stroke="#FF7A00" stroke-width="2" stroke-opacity="0.3">
    <path d="M150 150L250 250" stroke-dasharray="5 5">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M450 150L350 250" stroke-dasharray="5 5">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2.5s" repeatCount="indefinite" />
    </path>
    <path d="M150 350L250 250" stroke-dasharray="5 5">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M450 350L350 250" stroke-dasharray="5 5">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2.2s" repeatCount="indefinite" />
    </path>
  </g>

  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 250) rotate(90) scale(200)">
      <stop stop-color="#FF7A00"/>
      <stop offset="1" stop-color="#FF7A00" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
