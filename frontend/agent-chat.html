<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent Chat — VectorizeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--bg:#0d0f17;--bg2:#13161f;--bg3:#1a1e2e;--card:#1e2235;--border:#2a2f47;
  --accent:#ff7a00;--accent2:#ffb347;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --red:#f87171;--green:#34d399}
[data-theme="light"] {
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--card:#ffffff;--border:#e2e8f0;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#ff7a00;--accent2:#ffb347;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background 0.5s ease}

/* ── Pro Navbar ── */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000}

.nav-left{display:flex;align-items:center;gap:12px;flex:1}
.nav-center{display:flex;align-items:center;gap:12px;flex:1;justify-content:center;min-width:0}
.nav-right{display:flex;align-items:center;gap:12px;flex:1;justify-content:flex-end}

/* Mode Switches */
.mode-switches{display:flex;background:var(--bg3);padding:4px;border-radius:12px;border:1px solid var(--border)}
.m-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;
  transition:all .2s;color:var(--text3);background:transparent;display:flex;align-items:center;gap:6px}
.m-btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(255,122,0,0.25)}

/* Identity */
.ag-identity{display:flex;align-items:center;gap:12px;max-width:100%}
.ag-logo-circle{width:38px;height:38px;border-radius:50%;overflow:hidden;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ag-logo-img{width:100%;height:100%;object-fit:cover}
.ag-name-box{display:flex;flex-direction:column;min-width:0}
.ag-name{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-status{font-size:10px;color:var(--green);font-weight:700;display:flex;align-items:center;gap:4px}
.ag-status::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}

.nav-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;font-size:16px}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Chat Content ── */
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;align-items:center;position:relative}
.chat-window{width:100%;max-width:900px;display:flex;flex-direction:column;height:100%;transition:opacity 0.3s}

.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:24px}
.msg-wrap{display:flex;gap:14px;max-width:85%;animation:msg-in .35s ease}
@keyframes msg-in{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap.user{margin-left:auto;flex-direction:row-reverse}

.msg-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg-wrap.user .msg-icon{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.msg-wrap.assistant .msg-icon{background:var(--bg3);border:1px solid var(--border);color:var(--accent)}

.bubble{padding:14px 18px;border-radius:18px;font-size:14.5px;line-height:1.6;white-space:pre-wrap;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.msg-wrap.user .bubble{background:var(--accent);color:#fff;border-radius:20px 20px 4px 20px}
.msg-wrap.assistant .bubble{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:20px 20px 20px 4px}

/* Welcome Screen */
.welcome-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 20px}
.hero-orb{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:24px;box-shadow:0 0 40px rgba(255,122,0,0.3)}
.welcome-hero h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.welcome-hero p{color:var(--text2);font-size:16px;max-width:400px;line-height:1.8}

/* Input Area */
.input-dock{padding:24px;background:transparent;display:flex;justify-content:center}
.input-bar{width:100%;max-width:850px;display:flex;gap:12px;align-items:flex-end;background:var(--bg2);border:2px solid var(--border);border-radius:24px;padding:12px 20px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
#chat-input{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;outline:none;resize:none;min-height:28px;max-height:180px;line-height:1.6;font-family:inherit}
.action-btn{background:var(--accent);border:none;color:#fff;width:46px;height:46px;border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}

/* ── Voice Mode Full Overlay ── */
.voice-overlay{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:40px;text-align:center;animation:fade-in 0.5s ease}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.voice-overlay.active{display:flex}
.vo-orb{width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--accent), var(--accent2));display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:40px;position:relative;box-shadow:0 0 60px rgba(255,122,0,0.3)}
.vo-orb.listening{animation:pulse-vo 1.5s infinite}
@keyframes pulse-vo{0%{transform:scale(1);box-shadow:0 0 60px rgba(255,122,0,0.3)}50%{transform:scale(1.1);box-shadow:0 0 100px rgba(255,122,0,0.6)}100%{transform:scale(1);box-shadow:0 0 60px rgba(255,122,0,0.3)}}
.vo-status{font-size:24px;font-weight:800;color:var(--text);margin-bottom:12px}
.vo-sub{font-size:16px;color:var(--text2);margin-bottom:40px}
.vo-mic-btn{width:80px;height:80px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(255,122,0,0.4);transition:all 0.3s}
.vo-mic-btn:hover{transform:scale(1.1);background:var(--accent2)}
.vo-mic-btn.active{background:var(--red);animation:vibe-btn .2s infinite}
@keyframes vibe-btn{0%{transform:rotate(0)}25%{transform:rotate(3deg)}75%{transform:rotate(-3deg)}100%{transform:rotate(0)}}

/* Toasts */
.toast-wall{position:fixed;top:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:2000}
.toast-card{padding:14px 24px;border-radius:16px;font-size:13px;font-weight:700;background:var(--bg2);border:1px solid var(--border);box-shadow:0 15px 50px rgba(0,0,0,0.7)}
.toast-card.err{border-color:var(--red);color:var(--red)}
.vo-transcript{margin-top:20px;padding:15px;background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid var(--border);max-width:80%;font-style:italic;color:var(--text2);font-size:14px;min-height:50px;display:flex;align-items:center;justify-content:center;text-align:center}
</style>
</head>
<body id="body">

<nav class="navbar">
  <div class="nav-left">
    <div class="mode-switches">
      <button class="m-btn active" id="m-chat" onclick="setMode('text')"><i data-lucide="message-square" style="width:14px;height:14px"></i> Chat</button>
      <button class="m-btn" id="m-voice" onclick="setMode('v2v')"><i data-lucide="mic" style="width:14px;height:14px"></i> Voice</button>
    </div>
  </div>
  <div class="nav-center">
    <div class="ag-identity">
      <div class="ag-logo-circle">
        <img id="ag-logo-img" src="" class="ag-logo-img" style="display:none">
        <span id="ag-logo-init">🤖</span>
      </div>
      <div class="ag-name-box">
        <div class="ag-name" id="ag-title">AI Assistant</div>
        <div class="ag-status">Online</div>
      </div>
    </div>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="toggleTheme()"><i data-lucide="moon" id="theme-icon"></i></button>
    <button class="nav-btn" onclick="location.reload()"><i data-lucide="refresh-cw"></i></button>
  </div>
</nav>

<div class="chat-container">
  <!-- Voice Overlay -->
  <div class="voice-overlay" id="vo-overlay">
    <div class="vo-orb" id="vo-orb"><i data-lucide="mic" style="width:60px;height:60px"></i></div>
    <div class="vo-status" id="vo-status">Tap to Speak</div>
    <div class="vo-sub" id="vo-sub">I am listening to your voice</div>
    <div class="vo-transcript" id="vo-transcript"><i>Waiting for speech…</i></div>
    <button class="vo-mic-btn" id="vo-btn" onclick="toggleVoice()"><i data-lucide="mic"></i></button>
  </div>

  <div class="chat-window" id="chat-win">
    <div class="messages-area" id="msg-area">
      <div class="welcome-hero" id="hero">
        <div class="hero-orb">✨</div>
        <h1 id="hero-title">Welcome</h1>
        <p id="hero-desc">How can I assist you today?</p>
      </div>
    </div>
    <div class="input-dock">
      <div class="input-bar">
        <textarea id="chat-input" rows="1" placeholder="Type here…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="action-btn" onclick="sendMsg()"><i data-lucide="send"></i></button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wall" id="toasts"></div>

<script>
let session = {};
try { 
  // Check for impersonation first (matching dashboard logic)
  const imp = localStorage.getItem('mrairag_client_impersonate');
  if (imp) {
    session = JSON.parse(imp);
  } else {
    const raw = localStorage.getItem('mrairag_client');
    if(raw) session = JSON.parse(raw);
  }
} catch(e) {}
if(!session || !session.token) window.location.href = '/login';

const hdrs = () => ({'Content-Type':'application/json','X-App-Token':session.token});
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const params = new URLSearchParams(window.location.search);
const AGENT_ID = params.get('id');
if(!AGENT_ID) window.location.href = '/dashboard';

let _agentData = {};
let isTyping = false;
let chatMode = params.get('mode') || 'text';
let isListening = false;

function initTheme() {
  const theme = localStorage.getItem('mrairag_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mrairag_theme', next);
}
initTheme();

async function loadAgent() {
  try {
    const r = await fetch(`/api/agents/${AGENT_ID}`, { headers: hdrs() });
    if(!r.ok) {
      const txt = await r.text();
      console.error('Fetch error:', r.status, txt);
      throw new Error(`Server returned ${r.status}`);
    }
    const d = await r.json();
    _agentData = d;

    document.getElementById('ag-title').textContent = d.name || 'AI Assistant';
    document.getElementById('hero-title').textContent = d.name || 'Welcome';
    document.getElementById('hero-desc').textContent = d.description || 'Ready to help.';
    
    // Set Page Title
    document.title = (d.name || 'Agent') + ' Chat — VectorizeAI';

    if(d.customization && d.customization.logo_url) {
      document.getElementById('ag-logo-img').src = d.customization.logo_url;
      document.getElementById('ag-logo-img').style.display = 'block';
      document.getElementById('ag-logo-init').style.display = 'none';
      // Also update hero orb if it's the welcome screen
      const heroOrb = document.querySelector('.hero-orb');
      if(heroOrb) heroOrb.innerHTML = `<img src="${d.customization.logo_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    }
    if(d.customization && d.customization.color) {
      const c = d.customization.color;
      document.documentElement.style.setProperty('--accent', c);
      document.documentElement.style.setProperty('--accent2', c + 'cc');
      // Apply a more prominent background gradient
      document.getElementById('body').style.backgroundImage = `radial-gradient(circle at 10% 20%, ${c}22 0%, transparent 40%), radial-gradient(circle at 90% 80%, ${c}11 0%, transparent 40%)`;
      document.getElementById('body').style.backgroundColor = 'var(--bg)';
    }

    if(d.starting_message) {
      setTimeout(() => {
        const h = document.getElementById('hero');
        if(h) h.style.display = 'none';
        appendMessage('assistant', d.starting_message);
        if(chatMode === 'v2v') speakText(d.starting_message);
      }, 700);
    }
    setMode(chatMode);
    lucide.createIcons();
  } catch(e) {
    console.error('Load Failed:', e);
    toast('⚠️ Connection error. Please reload.', 'err');
  }
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text || isTyping) return;
  inp.value = ''; autoResize(inp); isTyping = true;
  document.getElementById('hero').style.display = 'none';
  appendMessage('user', text);
  const typing = appendTyping();
  const history = [];
  document.querySelectorAll('.msg-wrap:not(.typing-wrap)').forEach(m => {
    history.push({role: m.classList.contains('user')?'user':'assistant', content: m.querySelector('.bubble').textContent});
  });
  try {
    const r = await fetch(`/api/agents/${AGENT_ID}/ask`, { method:'POST', headers:hdrs(), body:JSON.stringify({question:text, history:history.slice(-6)}) });
    const d = await r.json();
    removeTyping(typing);
    const ans = d.answer || 'No response.';
    appendMessage('assistant', ans, d.sources || []);
    if(chatMode === 'v2v') speakText(ans);
  } catch(e) { removeTyping(typing); toast('❌ Send failed', 'err'); } finally { isTyping = false; }
}

function appendMessage(role, text, srcs) {
  const area = document.getElementById('msg-area');
  const div = document.createElement('div');
  div.className = 'msg-wrap ' + role;
  let sHtml = '';
  if(srcs && srcs.length) sHtml = '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">' + srcs.slice(0,2).map(s=>`<span style="font-size:10px;background:rgba(255,122,0,0.1);padding:3px 8px;border-radius:6px;color:var(--accent);border:1px solid rgba(255,122,0,0.2)">📎 ${esc(s.source_name||s.filename)}</span>`).join('') + '</div>';
  const icon = role === 'user' ? '<i data-lucide="user"></i>' : '<i data-lucide="bot"></i>';
  div.innerHTML = `<div class="msg-icon ${role}">${icon}</div><div class="bubble-box"><div class="bubble">${esc(text)}</div>${sHtml}</div>`;
  area.appendChild(div); area.scrollTop = area.scrollHeight;
  lucide.createIcons();
  return div;
}
function appendTyping() {
  const area = document.getElementById('msg-area');
  const div = document.createElement('div');
  div.className = 'msg-wrap assistant typing-wrap';
  div.innerHTML = '<div class="msg-icon assistant"><i data-lucide="bot"></i></div><div style="padding:12px;background:var(--bg3);border-radius:12px">Thinking…</div>';
  area.appendChild(div); area.scrollTop = area.scrollHeight;
  lucide.createIcons();
  return div;
}
function removeTyping(el) { if(el && el.parentNode) el.parentNode.removeChild(el); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,180)+'px'; }
function handleKey(e) { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }

function setMode(m) {
  chatMode = m;
  document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('m-' + (m==='text'?'chat':'voice'))?.classList.add('active');
  const vo = document.getElementById('vo-overlay');
  const win = document.getElementById('chat-win');
  if(m === 'v2v') { 
    vo.classList.add('active'); win.style.opacity = '0.3'; win.style.pointerEvents = 'none'; 
    if(_agentData.starting_message) speakText(_agentData.starting_message);
  }
  else { vo.classList.remove('active'); win.style.opacity = '1'; win.style.pointerEvents = 'auto'; window.speechSynthesis?.cancel(); }
}

function toggleVoice() {
  isListening = !isListening;
  const btn = document.getElementById('vo-btn');
  const orb = document.getElementById('vo-orb');
  const status = document.getElementById('vo-status');
  if(isListening) {
    window.speechSynthesis?.cancel(); // Stop talking if we start listening
    btn.classList.add('active');
    orb.classList.add('listening');
    status.textContent = 'Listening…';
    document.getElementById('vo-transcript').innerHTML = '<i>Listening…</i>';
    startRecognition();
  } else {
    btn.classList.remove('active');
    orb.classList.remove('listening');
    status.textContent = 'Tap to Speak';
    stopRecognition();
  }
}

let recognition;
function startRecognition() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Speech) return toast('Browser does not support speech recognition', 'err');
  if(recognition) recognition.stop();
  
  recognition = new Speech();
  recognition.lang = 'hi-IN, en-IN'; 
  recognition.interimResults = true; // Enabled interim results
  
  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; ++i) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    
    const trans = document.getElementById('vo-transcript');
    if(final) {
        trans.innerHTML = `<b>${final}</b>`;
        document.getElementById('chat-input').value = final;
        isListening = false;
        document.getElementById('vo-btn').classList.remove('active');
        document.getElementById('vo-orb').classList.remove('listening');
        document.getElementById('vo-status').textContent = 'Processing…';
        sendMsg();
    } else {
        trans.innerHTML = `<span>${interim}</span>`;
    }
  };

  recognition.onerror = (e) => {
    console.error('Recognition error:', e.error);
    if(e.error !== 'no-speech') toggleVoice();
  };

  recognition.onend = () => {
    if(isListening) recognition.start(); // Keep listening if we didn't get a result yet
  };

  recognition.start();
}
function stopRecognition() { if(recognition) { recognition.onend = null; recognition.stop(); } }

async function speakText(text) {
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  
  const status = document.getElementById('vo-status');
  if(chatMode === 'v2v') status.textContent = 'Speaking…';

  const u = new SpeechSynthesisUtterance(text);
  const cfg = _agentData.voice_config || {};
  
  // Try to find a matching voice
  const voices = speechSynthesis.getVoices();
  const isHindi = text.match(/[\u0900-\u097F]/);
  
  let v = voices.find(v => v.name.includes(cfg.voice_name || ''));
  if(!v) {
    if(isHindi) v = voices.find(v => v.lang.startsWith('hi'));
    else v = voices.find(v => v.lang.startsWith('en')); // Default to English if no Hindi found
  }
  
  if(v) u.voice = v;
  u.lang = isHindi ? 'hi-IN' : 'en-US';
  u.rate = 1.0;
  
  u.onend = () => {
    if(chatMode === 'v2v') {
      status.textContent = 'Tap to Speak';
      // Auto-start listening after a short delay
      setTimeout(() => { if(chatMode === 'v2v' && !isListening) toggleVoice(); }, 500);
    }
  };

  speechSynthesis.speak(u);
}

function toast(msg, type) {
  const tc = document.getElementById('toasts');
  const t = document.createElement('div'); t.className = 'toast-card ' + type; t.textContent = msg;
  tc.appendChild(t); setTimeout(() => t.remove(), 4000);
}
loadAgent();
</script>
</body>
</html>
