<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MR AI RAG — Login</title>
<meta name="description" content="Login or Register as a client to access MR AI RAG API playground and dashboard.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f17;--bg2:#13161f;--card:#1a1e2e;--border:#2a2f47;
  --accent:#6c63ff;--accent2:#00d4aa;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --red:#f87171;--green:#34d399;--yellow:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(108,99,255,.08) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(0,212,170,.06) 0%,transparent 50%);}

.auth-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:36px 32px;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:card-in .4s ease}
@keyframes card-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.auth-logo{width:48px;height:48px;border-radius:13px;margin:0 auto 18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;
  align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;
  box-shadow:0 6px 24px rgba(108,99,255,.35)}
.auth-title{text-align:center;font-size:21px;font-weight:800;margin-bottom:3px}
.auth-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:24px}

.auth-tabs{display:flex;border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:24px;background:var(--bg)}
.auth-tab{flex:1;padding:7px;border-radius:6px;border:none;background:transparent;
  color:var(--text3);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.auth-tab.active{background:linear-gradient(135deg,var(--accent),#5b52e0);color:#fff;box-shadow:0 2px 12px rgba(108,99,255,.35)}

.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);color:var(--text);
  padding:10px 13px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.1)}
.form-input::placeholder{color:var(--text3)}

.submit-btn{width:100%;padding:11px;border-radius:9px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#5b52e0);color:#fff;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;transition:all .2s;margin-top:6px}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,99,255,.4)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.submit-btn.green{background:linear-gradient(135deg,var(--accent2),#00a085)}
.submit-btn.green:hover{box-shadow:0 8px 24px rgba(0,212,170,.4)}

.result{font-size:11px;padding:9px 12px;border-radius:7px;margin-top:10px;display:none;line-height:1.5}
.result.error{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--red)}
.result.success{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);color:var(--green)}
.result.info{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);color:#93c5fd}

.auth-footer{text-align:center;font-size:11px;color:var(--text3);margin-top:18px}
.auth-footer a{color:var(--accent);text-decoration:none}
.auth-footer a:hover{text-decoration:underline}

.otp-step-label{font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:14px;
  padding:6px 10px;background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);
  border-radius:6px;display:flex;align-items:center;gap:6px}
.back-link{font-size:11px;color:var(--text3);cursor:pointer;text-decoration:underline;margin-bottom:12px;display:inline-block}
.back-link:hover{color:var(--accent)}

.resend-link{font-size:11px;color:var(--accent2);cursor:pointer;margin-top:8px;display:inline-block}
.resend-link:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">M</div>
  <div class="auth-title">MR AI RAG</div>
  <div class="auth-sub">API Intelligence Platform</div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- ─── LOGIN ─── -->
  <div id="form-login">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="submit-btn" id="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="result" id="login-result"></div>
    <div style="text-align:right;margin-top:10px">
      <span class="back-link" onclick="switchTab('register')">Don't have an account?</span>
    </div>
  </div>

  <!-- ─── REGISTER — Step 1: Fill form ─── -->
  <div id="form-register-step1" style="display:none">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-input" id="reg-name" placeholder="Your name" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="reg-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password <span style="color:var(--text3);font-weight:400">(min 6 chars)</span></label>
      <input type="password" class="form-input" id="reg-password" placeholder="Choose a password" autocomplete="new-password">
    </div>
    <button class="submit-btn" id="reg-btn" onclick="sendRegisterOTP()">Send Verification Code →</button>
    <div class="result" id="reg-result"></div>
  </div>

  <!-- ─── REGISTER — Step 2: Enter OTP ─── -->
  <div id="form-register-step2" style="display:none">
    <div class="otp-step-label">📩 Step 2 — Check your email for the OTP</div>
    <span class="back-link" onclick="goBackToStep1()">← Back</span>
    <div class="form-group">
      <label class="form-label">Verification Code</label>
      <input type="text" class="form-input" id="reg-otp" placeholder="6-digit code" maxlength="8" inputmode="numeric" style="font-size:20px;text-align:center;letter-spacing:6px;font-family:'JetBrains Mono',monospace" onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <button class="submit-btn green" id="verify-btn" onclick="doRegister()">✅ Verify & Create Account</button>
    <div style="text-align:center;margin-top:8px">
      <span class="resend-link" onclick="resendOTP()">Didn't receive it? Resend OTP</span>
    </div>
    <div class="result" id="reg-otp-result"></div>
  </div>

  <div class="auth-footer">
    <a href="/">← Home</a> &nbsp;·&nbsp; <a href="/api-docs">API Docs</a> &nbsp;·&nbsp; <a href="/playground">Playground</a>
  </div>
</div>

<script>
let regState = { name:'', email:'', password:'' };

// ── Tab Switch ────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-register').classList.toggle('active', t==='register');
  document.getElementById('form-login').style.display = t==='login'?'block':'none';
  document.getElementById('form-register-step1').style.display = t==='register'?'block':'none';
  document.getElementById('form-register-step2').style.display = 'none';
}

// ── Result Helper ─────────────────────────────────────────────────────────────
function showResult(id, cls, msg) {
  const el=document.getElementById(id);el.className='result '+cls;el.textContent=msg;el.style.display='block';
}

// ── Login ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  if(!email||!password) return showResult('login-result','error','⚠ Fill in email and password.');
  const btn=document.getElementById('login-btn');btn.disabled=true;btn.textContent='Signing in…';
  try {
    const r=await fetch('/api/clients/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(r.ok){
      localStorage.setItem('mrairag_client',JSON.stringify({client_id:d.client_id,token:d.token,name:d.name,email:d.email}));
      showResult('login-result','success','✅ '+d.message+' Redirecting…');
      setTimeout(()=>window.location.href='/dashboard',900);
    } else {
      showResult('login-result','error','❌ '+( d.detail||'Login failed'));
    }
  }catch(e){ showResult('login-result','error','❌ Network error: '+e.message); }
  finally{ btn.disabled=false;btn.textContent='Sign In →'; }
}

// ── Register Step 1: Send OTP ─────────────────────────────────────────────────
async function sendRegisterOTP() {
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const password=document.getElementById('reg-password').value;
  if(!name||!email||!password) return showResult('reg-result','error','⚠ Fill in all fields.');
  if(password.length<6) return showResult('reg-result','error','⚠ Password must be at least 6 characters.');

  regState={name,email,password};
  const btn=document.getElementById('reg-btn');btn.disabled=true;btn.textContent='Sending OTP…';
  try {
    const r=await fetch('/api/clients/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,name,purpose:'register'})});
    const d=await r.json();
    if(r.ok){
      showResult('reg-result','success','📩 '+d.message);
      setTimeout(()=>{
        document.getElementById('form-register-step1').style.display='none';
        document.getElementById('form-register-step2').style.display='block';
      }, 500);
    } else {
      showResult('reg-result','error','❌ '+(d.detail||'Failed to send OTP'));
    }
  }catch(e){ showResult('reg-result','error','❌ Network error: '+e.message); }
  finally{ btn.disabled=false;btn.textContent='Send Verification Code →'; }
}

// ── Register Step 2: Verify OTP ───────────────────────────────────────────────
async function doRegister() {
  const otp=document.getElementById('reg-otp').value.trim();
  if(!otp) return showResult('reg-otp-result','error','⚠ Enter the OTP from your email.');
  const btn=document.getElementById('verify-btn');btn.disabled=true;btn.textContent='Verifying…';
  try {
    const r=await fetch('/api/clients/register',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:regState.name,email:regState.email,password:regState.password,otp})});
    const d=await r.json();
    if(r.ok){
      localStorage.setItem('mrairag_client',JSON.stringify({client_id:d.client_id,token:d.token,name:d.name,email:d.email}));
      showResult('reg-otp-result','success','✅ '+d.message+' Redirecting to dashboard…');
      setTimeout(()=>window.location.href='/dashboard',1200);
    } else {
      showResult('reg-otp-result','error','❌ '+(d.detail||'OTP verification failed'));
    }
  }catch(e){ showResult('reg-otp-result','error','❌ Network error: '+e.message); }
  finally{ btn.disabled=false;btn.textContent='✅ Verify & Create Account'; }
}

function goBackToStep1(){
  document.getElementById('form-register-step1').style.display='block';
  document.getElementById('form-register-step2').style.display='none';
}

async function resendOTP() {
  if(!regState.email) return;
  try {
    const r=await fetch('/api/clients/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:regState.email,name:regState.name,purpose:'register'})});
    const d=await r.json();
    showResult('reg-otp-result','info','📩 '+d.message);
  }catch(e){ showResult('reg-otp-result','error','Error: '+e.message); }
}

// ── Auto-redirect if logged in ─────────────────────────────────────────────────
(function(){
  try{ const s=JSON.parse(localStorage.getItem('mrairag_client'));if(s?.token&&s?.client_id)window.location.href='/dashboard'; }catch{}
})();
</script>
</body>
</html>
