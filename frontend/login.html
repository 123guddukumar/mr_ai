<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VectorizeAI — Login</title>
<meta name="description" content="Login or Register to access VectorizeAI intelligence infrastructure.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030712;--bg2:#0f172a;--card:#111827;--border:#1f2937;
  --accent:#ff7a00;--accent2:#ffb347;--text:#f8fafc;--text2:#94a3b8;--text3:#64748b;
  --red:#f87171;--green:#34d399;--yellow:#fbbf24;
}
[data-theme="light"] {
  --bg:#f8fafc;--bg2:#ffffff;--card:#ffffff;--border:#e2e8f0;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --accent:#ff7a00;--accent2:#ffb347;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(255,122,0,.08) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(255,179,71,.06) 0%,transparent 50%);}

.auth-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:40px 36px;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:card-in .5s cubic-bezier(0.16, 1, 0.3, 1)}
@keyframes card-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.auth-logo{width:56px;height:56px;margin:0 auto 20px;display:block}
.auth-title{text-align:center;font-size:24px;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px}
.auth-sub{text-align:center;font-size:13px;color:var(--text3);margin-bottom:32px}

.auth-tabs{display:flex;border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;background:var(--bg)}
.auth-tab{flex:1;padding:10px;border-radius:9px;border:none;background:transparent;
  color:var(--text3);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(255,122,0,0.25)}

.form-group{margin-bottom:18px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);color:var(--text);
  padding:12px 15px;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;transition:all .2s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,122,0,.15)}
.form-input::placeholder{color:var(--text3)}

.submit-btn{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;
  background:var(--accent);color:#fff;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:700;transition:all .3s;margin-top:8px;
  box-shadow: 0 4px 15px rgba(255, 122, 0, 0.2)}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255, 122, 0, 0.3)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.submit-btn.green{background:var(--green);box-shadow: 0 4px 15px rgba(52, 211, 153, 0.2)}

.result{font-size:12px;padding:12px;border-radius:10px;margin-top:14px;display:none;line-height:1.5}
.result.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.result.success{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--green)}

.auth-footer{text-align:center;font-size:12px;color:var(--text3);margin-top:24px}
.auth-footer a{color:var(--accent);text-decoration:none}
.auth-footer a:hover{text-decoration:underline}

.otp-step-label{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:16px;
  padding:8px 12px;background:rgba(255,122,0,0.08);border:1px solid rgba(255,122,0,0.2);
  border-radius:8px;display:flex;align-items:center;gap:8px}
.back-link{font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline;margin-bottom:14px;display:inline-block}
.back-link:hover{color:var(--accent)}
</style>
</head>
<body>

<div class="auth-card">
  <img src="./assets/vectorize_logo.png" class="auth-logo" alt="VectorizeAI Logo">
  <div class="auth-title">VectorizeAI</div>
  <div class="auth-sub">Intelligence Infrastructure</div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- ─── LOGIN ─── -->
  <div id="form-login">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="submit-btn" id="login-btn" onclick="doLogin()">Sign In to Dashboard →</button>
    <div class="result" id="login-result"></div>
    <div style="text-align:right;margin-top:14px">
      <span class="back-link" onclick="switchTab('register')">Need an account? Create one</span>
    </div>
  </div>

  <!-- ─── REGISTER — Step 1: Fill form ─── -->
  <div id="form-register-step1" style="display:none">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-input" id="reg-name" placeholder="John Doe" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="reg-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password <span style="color:var(--text3);font-weight:400">(min 6 chars)</span></label>
      <input type="password" class="form-input" id="reg-password" placeholder="Choose a secure password" autocomplete="new-password">
    </div>
    <button class="submit-btn" id="reg-btn" onclick="sendRegisterOTP()">Send Verification Code →</button>
    <div class="result" id="reg-result"></div>
  </div>

  <!-- ─── REGISTER — Step 2: Enter OTP ─── -->
  <div id="form-register-step2" style="display:none">
    <div class="otp-step-label">📩 Check your email for the code</div>
    <span class="back-link" onclick="goBackToStep1()">← Edit details</span>
    <div class="form-group">
      <label class="form-label">Verification Code</label>
      <input type="text" class="form-input" id="reg-otp" placeholder="••••••" maxlength="8" inputmode="numeric" style="font-size:24px;text-align:center;letter-spacing:8px;font-family:'JetBrains Mono',monospace" onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <button class="submit-btn green" id="verify-btn" onclick="doRegister()">✅ Verify & Create Account</button>
    <div style="text-align:center;margin-top:12px">
      <span class="resend-link" onclick="resendOTP()" style="font-size:12px;color:var(--accent);cursor:pointer">Didn't receive it? Resend code</span>
    </div>
    <div class="result" id="reg-otp-result"></div>
  </div>

  <div class="auth-footer">
    <a href="/">← Back to Home</a> &nbsp;·&nbsp; <a href="/api-docs">API Docs</a> &nbsp;·&nbsp; <a href="/playground">Playground</a>
  </div>
</div>

<script>
// Theme Management
function initTheme() {
  const theme = localStorage.getItem('mrairag_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
}
initTheme();

let regState = { name:'', email:'', password:'' };

// ── Tab Switch ────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-register').classList.toggle('active', t==='register');
  document.getElementById('form-login').style.display = t==='login'?'block':'none';
  document.getElementById('form-register-step1').style.display = t==='register'?'block':'none';
  document.getElementById('form-register-step2').style.display = 'none';
}

// ── Result Helper ─────────────────────────────────────────────────────────────
function showResult(id, cls, msg) {
  const el=document.getElementById(id);el.className='result '+cls;el.textContent=msg;el.style.display='block';
}

// ── Login ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  if(!email||!password) return showResult('login-result','error','⚠ Fill in email and password.');
  const btn=document.getElementById('login-btn');btn.disabled=true;btn.textContent='Signing in…';
  try {
    const r=await fetch('/api/clients/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(r.ok){
      localStorage.setItem('mrairag_client',JSON.stringify({
        client_id:d.client_id,
        token:d.token,
        name:d.name,
        email:d.email,
        logo_url:d.logo_url
      }));
      showResult('login-result','success','✅ Login successful! Redirecting…');
      setTimeout(()=>window.location.href='/dashboard',800);
    } else {
      showResult('login-result','error','❌ '+( d.detail||'Login failed'));
    }
  }catch(e){ showResult('login-result','error','❌ Network error: '+e.message); }
  finally{ btn.disabled=false;btn.textContent='Sign In to Dashboard →'; }
}

// ── Register Step 1: Send OTP ─────────────────────────────────────────────────
async function sendRegisterOTP() {
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const password=document.getElementById('reg-password').value;
  if(!name||!email||!password) return showResult('reg-result','error','⚠ Fill in all fields.');
  if(password.length<6) return showResult('reg-result','error','⚠ Password must be at least 6 characters.');

  regState={name,email,password};
  const btn=document.getElementById('reg-btn');btn.disabled=true;btn.textContent='Sending code…';
  try {
    const r=await fetch('/api/clients/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,name,purpose:'register'})});
    const d=await r.json();
    if(r.ok){
      showResult('reg-result','success','📩 Verification code sent!');
      setTimeout(()=>{
        document.getElementById('form-register-step1').style.display='none';
        document.getElementById('form-register-step2').style.display='block';
      }, 500);
    } else {
      showResult('reg-result','error','❌ '+(d.detail||'Failed to send code'));
    }
  }catch(e){ showResult('reg-result','error','❌ Network error: '+e.message); }
  finally{ btn.disabled=false;btn.textContent='Send Verification Code →'; }
}

// ── Register Step 2: Verify OTP ───────────────────────────────────────────────
async function doRegister() {
  const otp=document.getElementById('reg-otp').value.trim();
  if(!otp) return showResult('reg-otp-result','error','⚠ Enter the verification code.');
  const btn=document.getElementById('verify-btn');btn.disabled=true;btn.textContent='Verifying…';
  try {
    const r=await fetch('/api/clients/register',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:regState.name,email:regState.email,password:regState.password,otp})});
    const d=await r.json();
    if(r.ok){
      localStorage.setItem('mrairag_client',JSON.stringify({
        client_id:d.client_id,
        token:d.token,
        name:d.name,
        email:d.email,
        logo_url:d.logo_url
      }));
      showResult('reg-otp-result','success','✅ Account created! Redirecting…');
      setTimeout(()=>window.location.href='/dashboard',1000);
    } else {
      showResult('reg-otp-result','error','❌ '+(d.detail||'Verification failed'));
    }
  }catch(e){ showResult('reg-otp-result','error','❌ Network error: '+e.message); }
  finally{ btn.disabled=false;btn.textContent='✅ Verify & Create Account'; }
}

function goBackToStep1(){
  document.getElementById('form-register-step1').style.display='block';
  document.getElementById('form-register-step2').style.display='none';
}

async function resendOTP() {
  if(!regState.email) return;
  try {
    const r=await fetch('/api/clients/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:regState.email,name:regState.name,purpose:'register'})});
    const d=await r.json();
    showResult('reg-otp-result','success','📩 New code sent!');
  }catch(e){ showResult('reg-otp-result','error','Error: '+e.message); }
}

(function(){
  try{
    const s=JSON.parse(localStorage.getItem('mrairag_client'));
    if(s?.token&&s?.client_id) { window.location.href='/dashboard'; return; }
  }catch{}
  const params = new URLSearchParams(window.location.search);
  if(params.get('tab') === 'register') switchTab('register');
})();
</script>
</body>
</html>
