<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent Chat — VectorizeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--bg:#0d0f17;--bg2:#13161f;--bg3:#1a1e2e;--card:#1e2235;--border:#2a2f47;
  --accent:#ff7a00;--accent2:#ffb347;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --red:#f87171;--green:#34d399}
[data-theme="light"] {
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--card:#ffffff;--border:#e2e8f0;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#ff7a00;--accent2:#ffb347;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background 0.5s ease}

/* ── Pro Navbar ── */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000}

.nav-left{display:flex;align-items:center;gap:12px;flex:1}
.nav-center{display:flex;align-items:center;gap:12px;flex:1;justify-content:center;min-width:0}
.nav-right{display:flex;align-items:center;gap:12px;flex:1;justify-content:flex-end}

/* Mode Switches */
.mode-switches{display:flex;background:var(--bg3);padding:4px;border-radius:12px;border:1px solid var(--border)}
.m-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;
  transition:all .2s;color:var(--text3);background:transparent;display:flex;align-items:center;gap:6px}
.m-btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(255,122,0,0.25)}

/* Identity */
.ag-identity{display:flex;align-items:center;gap:12px;max-width:100%}
.ag-logo-circle{width:38px;height:38px;border-radius:50%;overflow:hidden;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ag-logo-img{width:100%;height:100%;object-fit:cover}
.ag-name-box{display:flex;flex-direction:column;min-width:0}
.ag-name{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-status{font-size:10px;color:var(--green);font-weight:700;display:flex;align-items:center;gap:4px}
.ag-status::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}

.nav-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;font-size:16px}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Chat Content ── */
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;align-items:center;position:relative}
.chat-window{width:100%;max-width:900px;display:flex;flex-direction:column;height:100%;transition:opacity 0.3s}

.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:24px}
.msg-wrap{display:flex;gap:14px;max-width:100%;animation:msg-in .35s ease}
@keyframes msg-in{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap.user{margin-left:auto;flex-direction:row-reverse}

.msg-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg-wrap.user .msg-icon{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000000}
.msg-wrap.assistant .msg-icon{background:var(--bg3);border:1px solid var(--border);color:var(--accent)}

.bubble{padding:14px 18px;border-radius:18px;font-size:14.5px;line-height:1.6;white-space:pre-wrap;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.msg-wrap.user .bubble{background:var(--accent);color:#000000;border-radius:20px 20px 4px 20px}
.msg-wrap.assistant .bubble{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:20px 20px 20px 4px}

/* Welcome Screen */
.welcome-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 20px}
.hero-orb{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:24px;box-shadow:0 0 40px rgba(255,122,0,0.3)}
.welcome-hero h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.welcome-hero p{color:var(--text2);font-size:16px;max-width:400px;line-height:1.8}

/* Input Area */
.input-dock{padding:24px;background:transparent;display:flex;justify-content:center}
.input-bar{width:100%;max-width:850px;display:flex;gap:12px;align-items:flex-end;background:var(--bg2);border:2px solid var(--border);border-radius:24px;padding:12px 20px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
#chat-input{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;outline:none;resize:none;min-height:28px;max-height:180px;line-height:1.6;font-family:inherit}
.action-btn{background:var(--accent);border:none;color:#fff;width:46px;height:46px;border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.input-attach-btn{background:transparent;border:1px solid var(--border);color:var(--text2);width:38px;height:38px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;font-size:17px;padding:0}
.input-attach-btn:hover{background:rgba(255,255,255,0.08);color:var(--accent);border-color:var(--accent)}
#file-preview-strip{display:none;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;margin-bottom:6px;font-size:12px;color:var(--text2);width:100%;max-width:850px;box-sizing:border-box;flex-wrap:wrap}
.file-preview-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.file-preview-icon{width:44px;height:44px;border-radius:10px;background:rgba(255,122,0,0.12);border:1px solid rgba(255,122,0,0.25);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.file-preview-name{flex:1;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.file-preview-remove{background:rgba(255,50,50,0.15);border:none;color:#ff5555;width:24px;height:24px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;padding:0}
.file-preview-remove:hover{background:rgba(255,50,50,0.3)}

/* ── Voice Mode Full Overlay ── */
.voice-overlay{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:40px;text-align:center;animation:fade-in 0.5s ease}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.voice-overlay.active{display:flex}
.vo-orb{width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--accent), var(--accent2));display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:40px;position:relative;box-shadow:0 0 60px rgba(255,122,0,0.3);overflow:hidden;border:4px solid var(--accent);flex-shrink:0}
.vo-orb img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.vo-orb i, .vo-orb svg{width:60px;height:60px;flex-shrink:0;display:block}
.vo-orb.listening{animation:pulse-vo 1.5s infinite}
@keyframes pulse-vo{0%{transform:scale(1);box-shadow:0 0 60px rgba(255,122,0,0.3)}50%{transform:scale(1.1);box-shadow:0 0 100px rgba(255,122,0,0.6)}100%{transform:scale(1);box-shadow:0 0 60px rgba(255,122,0,0.3)}}
.vo-status{font-size:24px;font-weight:800;color:var(--text);margin-bottom:12px}
.vo-sub{font-size:16px;color:var(--text2);margin-bottom:40px}
.vo-mic-btn{width:80px;height:80px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(255,122,0,0.4);transition:all 0.3s;flex-shrink:0}
.vo-mic-btn i, .vo-mic-btn svg{width:32px;height:32px;flex-shrink:0;display:block}
.vo-mic-btn:hover{transform:scale(1.1);background:var(--accent2)}
.vo-mic-btn.active{background:var(--red);animation:vibe-btn .2s infinite}
@keyframes vibe-btn{0%{transform:rotate(0)}25%{transform:rotate(3deg)}75%{transform:rotate(-3deg)}100%{transform:rotate(0)}}

/* Toasts */
.toast-wall{position:fixed;top:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:2000}
.toast-card{padding:14px 24px;border-radius:16px;font-size:13px;font-weight:700;background:var(--bg2);border:1px solid var(--border);box-shadow:0 15px 50px rgba(0,0,0,0.7)}
.toast-card.err{border-color:var(--red);color:var(--red)}
.vo-transcript{margin-top:20px;padding:15px;background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid var(--border);max-width:80%;font-style:italic;color:var(--text2);font-size:14px;min-height:50px;display:flex;align-items:center;justify-content:center;text-align:center}

/* Feedback & Report Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13, 15, 23, 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  padding: 20px;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
.modal-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px;
  width: 100%;
  max-width: 460px;
  padding: 30px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  transform: translateY(20px);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.modal-overlay.open .modal-box {
  transform: translateY(0);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title {
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-close {
  background: transparent;
  border: none;
  color: var(--text2);
  cursor: pointer;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover {
  color: var(--red);
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.form-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
}
.form-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  font-family: inherit;
  transition: all 0.2s;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(255, 122, 0, 0.15);
}
.type-toggle-group {
  display: flex;
  background: var(--bg3);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.type-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  background: transparent;
  color: var(--text3);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.type-btn.active {
  background: var(--accent);
  color: #000000;
  box-shadow: 0 4px 12px rgba(255, 122, 0, 0.25);
}
.star-rating {
  display: flex;
  gap: 8px;
  font-size: 24px;
  color: var(--text3);
  align-items: center;
}
.star-rating i, .star-rating svg {
  cursor: pointer;
  transition: all 0.2s;
}
.star-rating i:hover, .star-rating svg:hover,
.star-rating i.active, .star-rating svg.active {
  color: var(--accent);
  transform: scale(1.1);
}
.star-rating i.active, .star-rating svg.active {
  fill: var(--accent);
}
.submit-btn {
  background: var(--accent);
  color: #000000;
  border: none;
  border-radius: 14px;
  padding: 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.submit-btn:hover {
  background: var(--accent2);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 122, 0, 0.3);
}
.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ── Action Banner ── */
.ag-action-banner {
  background: linear-gradient(135deg, rgba(79, 70, 229, 0.95), rgba(124, 58, 237, 0.95));
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 14px;
  padding: 10px 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(10px);
  color: #ffffff;
  font-size: 13px;
  animation: slideUpAction 0.3s ease;
}
.ag-action-banner.whatsapp {
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.95), rgba(5, 150, 105, 0.95));
}
@keyframes slideUpAction {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.ag-action-btn {
  background: #ffffff;
  color: #0f172a;
  font-weight: 700;
  font-size: 12px;
  padding: 7px 15px;
  border-radius: 20px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  transition: all 0.2s ease;
}
.ag-action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
.ag-action-close {
  background: rgba(255, 255, 255, 0.25);
  border: none;
  color: #ffffff;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  margin-left: 10px;
  transition: all 0.2s;
}
.ag-action-close:hover {
  background: rgba(255, 255, 255, 0.45);
  transform: scale(1.1);
}

/* ── Premium Landing Page ── */
.landing-overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 30%, rgba(255, 122, 0, 0.15) 0%, var(--bg) 80%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
}
.landing-content {
  width: 100%;
  max-width: 400px;
  background: rgba(30, 34, 53, 0.45);
  border: 1px solid var(--accent);
  border-radius: 28px;
  padding: 35px 24px;
  text-align: center;
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: fade-in-landing 0.5s ease forwards;
}
@keyframes fade-in-landing {
  from { opacity: 0; }
  to { opacity: 1; }
}
.landing-top-body {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.landing-avatar-container {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  margin: 0 auto 28px auto;
  border: 3px solid var(--accent);
  background: var(--bg3);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 35px rgba(255, 122, 0, 0.35);
}
.landing-avatar-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#landing-avatar-init {
  font-size: 48px;
}
.landing-name {
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.landing-desc {
  font-size: 15px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 28px;
  max-width: 320px;
}
.landing-bubble-wrap {
  display: flex;
  justify-content: center;
  width: 100%;
  max-width: 350px;
  margin-bottom: 20px;
}
.landing-bubble {
  /* background: rgba(255, 255, 255, 0.04); */
  /* border: 1px solid rgba(255, 255, 255, 0.08); */
  border-radius: 20px;
  padding: 16px 22px;
  font-size: 14.5px;
  color: var(--text);
  width: 100%;
  line-height: 1.5;
  text-align: left;
  position: relative;
  /* box-shadow: 0 4px 20px rgba(0,0,0,0.15); */
}
.landing-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 30px;
  border-width: 8px 8px 0 0;
  border-style: solid;
  border-color: rgba(255, 255, 255, 0.04) transparent transparent transparent;
}
.landing-buttons {
  width: 100%;
  max-width: 400px;
  display: flex;
  gap: 16px;
  margin-top: 15px;
}
.landing-btn {
  flex: 1;
  height: 52px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.landing-btn.btn-chat {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
}
.landing-btn.btn-chat:hover {
  background: var(--border);
  transform: translateY(-2px);
}
.landing-btn.btn-talk {
  background: var(--accent);
  color: #000000;
  box-shadow: 0 6px 20px rgba(255, 122, 0, 0.3);
}
.landing-btn.btn-talk:hover {
  background: var(--accent2);
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255, 122, 0, 0.45);
}

.input-mic-btn {
  display: none;
}
@media (max-width: 767px) {
  .input-mic-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    color: var(--text2);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    margin-right: 8px;
  }
  .input-mic-btn:hover {
    color: var(--accent);
    background: rgba(255, 122, 0, 0.1);
  }
  .navbar .mode-switches {
    display: none !important;
  }
  .navbar .nav-left {
    display: none !important;
  }
}
@media (min-width: 768px) {
  #mobile-landing-page {
    display: none !important;
  }
}

.suggestions-bar {
  display: none;
  gap: 10px;
  padding: 8px 24px 0 24px;
  overflow-x: auto;
  width: 100%;
  max-width: 850px;
  margin: 0 auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.suggestions-bar::-webkit-scrollbar {
  display: none;
}
.suggestion-chip {
  padding: 8px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  font-size: 12.5px;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  font-weight: 500;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.suggestion-chip:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  transform: translateY(-1px);
}
.suggestion-chip.ai-suggested {
  background: rgba(34, 197, 94, 0.15) !important;
  color: #22c55e !important;
  border-color: rgba(34, 197, 94, 0.4) !important;
}
.suggestion-chip.ai-suggested:hover {
  background: #22c55e !important;
  color: #fff !important;
  border-color: #22c55e !important;
}
[data-theme="light"] .suggestion-chip.ai-suggested {
  background: rgba(34, 197, 94, 0.1) !important;
  color: #15803d !important;
  border-color: rgba(34, 197, 94, 0.3) !important;

<script>
// ==========================================
// CONFIGURATION: CHANGE THIS TO YOUR BACKEND API DOMAIN
// Example: "https://your-backend-api.com" (No trailing slash)
// Leave empty "" if running on the same server/domain.
// ==========================================
const BACKEND_URL = "https://your-backend-api.com";

let session = {};
let isPublic = true; // Always guest/public mode for the shared chat link so Lead Capture triggers
try { 
  // Check for impersonation first (matching dashboard logic)
  const imp = localStorage.getItem('mrairag_client_impersonate');
  if (imp) {
    session = JSON.parse(imp);
  } else {
    const raw = localStorage.getItem('mrairag_client');
    if(raw) session = JSON.parse(raw);
  }
} catch(e) {}

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const params = new URLSearchParams(window.location.search);
const AGENT_ID = params.get('id');
if(!AGENT_ID) window.location.href = isPublic ? '/login' : '/dashboard';

// Setup device details for public mode
let deviceId = '';
let sessionId = '';
let deviceName = '';
if (isPublic) {
  deviceId = localStorage.getItem('ag_device_id');
  if (!deviceId) {
    deviceId = 'dev_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
    localStorage.setItem('ag_device_id', deviceId);
  }
  sessionId = sessionStorage.getItem('ag_session_id_' + AGENT_ID);
  if (!sessionId) {
    sessionId = 'sess_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
    sessionStorage.setItem('ag_session_id_' + AGENT_ID, sessionId);
  }
  function getDeviceName() {
    const ua = navigator.userAgent;
    if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) return "Tablet";
    if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated/i.test(ua)) return "Mobile Phone";
    if (/Macintosh/i.test(ua)) return "Mac PC";
    if (/Windows/i.test(ua)) return "Windows PC";
    if (/Linux/i.test(ua)) return "Linux PC";
    return "Unknown PC";
  }
  deviceName = getDeviceName();
}

const hdrs = () => isPublic ? {'Content-Type':'application/json'} : {'Content-Type':'application/json','X-App-Token':session.token};

let _agentData = {};
let isTyping = false;
let chatMode = params.get('mode') || 'text';
let isListening = false;

function initTheme() {
  const theme = localStorage.getItem('mrairag_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mrairag_theme', next);
}
initTheme();

async function loadAgent() {
  try {
    let url = isPublic ? `/api/agents/${AGENT_ID}/public-info` : `/api/agents/${AGENT_ID}`;
    let r = await fetch(BACKEND_URL + url, { headers: hdrs() });
    
    // Automatically fall back to public guest mode if private loading fails
    if (!isPublic && (r.status === 404 || r.status === 401)) {
      console.warn('Private agent load failed, falling back to public mode...');
      isPublic = true;
      
      // Initialize public session IDs if not already done
      if (!deviceId) {
        deviceId = localStorage.getItem('ag_device_id') || ('dev_' + Math.random().toString(36).substring(2, 15));
        localStorage.setItem('ag_device_id', deviceId);
      }
      if (!sessionId) {
        sessionId = 'sess_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        sessionStorage.setItem('ag_session_id', sessionId);
      }
      if (!deviceName) {
        function getDeviceName() {
          const ua = navigator.userAgent;
          if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) return "Tablet";
          if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated/i.test(ua)) return "Mobile Phone";
          return "Windows/Mac PC";
        }
        deviceName = getDeviceName();
      }

      url = `/api/agents/${AGENT_ID}/public-info`;
      r = await fetch(BACKEND_URL + url, { headers: {'Content-Type':'application/json'} });
    }

    if(!r.ok) {
      const txt = await r.text();
      console.error('Fetch error:', r.status, txt);
      throw new Error(`Server returned ${r.status}`);
    }
    const d = await r.json();
    _agentData = d;

    document.getElementById('ag-title').textContent = d.name || 'AI Assistant';
    document.getElementById('hero-title').textContent = d.name || 'Welcome';
    document.getElementById('hero-desc').textContent = d.description || 'Ready to help.';
    
    // Set Page Title
    document.title = (d.name || 'Agent') + ' Chat — VectorizeAI';

    // Populate landing page content
    document.getElementById('landing-name').textContent = d.name || 'AI Assistant';
    document.getElementById('landing-desc').textContent = d.description || 'Ready to help.';
    document.getElementById('landing-start-msg').textContent = d.starting_message || 'Hello! How can I help you today?';
    
    if (d.customization && d.customization.author_image_url) {
      document.getElementById('landing-avatar').src = d.customization.author_image_url;
      document.getElementById('landing-avatar').style.display = 'block';
      document.getElementById('landing-avatar-init').style.display = 'none';
    } else if (d.customization && d.customization.logo_url) {
      document.getElementById('landing-avatar').src = d.customization.logo_url;
      document.getElementById('landing-avatar').style.display = 'block';
      document.getElementById('landing-avatar-init').style.display = 'none';
    }

    // Set Voice orb avatar image
    const voOrb = document.getElementById('vo-orb');
    if (voOrb) {
      if (d.customization && d.customization.author_image_url) {
        voOrb.innerHTML = `<img src="${d.customization.author_image_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
      } else if (d.customization && d.customization.logo_url) {
        voOrb.innerHTML = `<img src="${d.customization.logo_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
      } else {
        voOrb.innerHTML = `<span style="font-size:70px">🤖</span>`;
      }
    }

    // Initialize suggestions
    if (d.customization && d.customization.qa_pairs) {
      renderSuggestions(d.customization.qa_pairs);
    }

    if(d.customization && d.customization.logo_url) {
      document.getElementById('ag-logo-img').src = d.customization.logo_url;
      document.getElementById('ag-logo-img').style.display = 'block';
      document.getElementById('ag-logo-init').style.display = 'none';
      const heroOrb = document.querySelector('.hero-orb');
      if(heroOrb) heroOrb.innerHTML = `<img src="${d.customization.logo_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    }
    if(d.customization && d.customization.color) {
      const c = d.customization.color;
      document.documentElement.style.setProperty('--accent', c);
      document.documentElement.style.setProperty('--accent2', c + 'cc');
      document.getElementById('body').style.backgroundImage = `radial-gradient(circle at 10% 20%, ${c}22 0%, transparent 40%), radial-gradient(circle at 90% 80%, ${c}11 0%, transparent 40%)`;
      document.getElementById('body').style.backgroundColor = 'var(--bg)';
      document.getElementById('mobile-landing-page').style.background = `radial-gradient(circle at 50% 30%, ${c}25 0%, var(--bg) 100%)`;
    }

    if (d.customization && d.customization.whatsapp_number) {
      const cleanWaNum = d.customization.whatsapp_number.replace(/[^\d]/g, '');
      if (cleanWaNum) {
        const waUrl = `https://wa.me/${cleanWaNum}`;
        const navWa = document.getElementById('nav-whatsapp-link');
        if (navWa) {
          navWa.href = waUrl;
          navWa.style.display = 'inline-flex';
        }
        const landWa = document.getElementById('landing-whatsapp-link');
        if (landWa) {
          landWa.href = waUrl;
          landWa.style.display = 'inline-flex';
        }
      }
    }

    // Trigger mobile landing page if responsive
    checkShowLandingPage();

    const hasPastHistory = await loadPublicHistory();

    if(!hasPastHistory && d.starting_message) {
      setTimeout(() => {
        const h = document.getElementById('hero');
        if(h) h.style.display = 'none';
        appendMessage('assistant', d.starting_message);
        if(chatMode === 'v2v') speakText(d.starting_message);
      }, 700);
    }
    setMode(chatMode);
    lucide.createIcons();

    // Start background polling for creator action buttons
    setInterval(checkSessionAction, 4000);
  } catch(e) {
    console.error('Load Failed:', e);
    toast('⚠️ Connection error. Please reload.', 'err');
  }
}

let currentActionData = null;
let dismissedActionTime = null;

function renderActionBanner(action) {
  const container = document.getElementById('action-banner-wrapper');
  if (!container) return;
  
  if (!action || !action.action_type) {
    container.innerHTML = '';
    return;
  }
  
  if (dismissedActionTime === action.created_at) {
    return;
  }
  
  currentActionData = action;
  const isWa = action.action_type === 'whatsapp';
  const cleanPhone = (action.phone_number || '').replace(/[^\d+]/g, '');
  const targetUrl = isWa 
    ? `https://wa.me/${cleanPhone.replace('+', '')}`
    : `tel:${cleanPhone}`;
    
  const bannerClass = isWa ? 'ag-action-banner whatsapp' : 'ag-action-banner';
  const icon = isWa ? '💬' : '📞';
  const label = action.message || (isWa ? 'Connect on WhatsApp' : 'Call Us Now');
  const btnText = isWa ? 'Book Meeting' : `Call ${cleanPhone}`;
  
  const actionBtnHtml = isWa
    ? `<button onclick="openMeetingCalendarModal('${cleanPhone.replace('+', '')}')" class="ag-action-btn" style="border:none; cursor:pointer;">${btnText}</button>`
    : `<a href="${targetUrl}" target="_self" class="ag-action-btn">${btnText}</a>`;

  container.innerHTML = `
    <div class="${bannerClass}">
      <div style="display:flex; align-items:center; gap:8px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">
        <span style="font-size:16px">${icon}</span>
        <span style="overflow:hidden; text-overflow:ellipsis">${esc(label)}</span>
      </div>
      <div style="display:flex; align-items:center; flex-shrink:0">
        ${actionBtnHtml}
        <button class="ag-action-close" onclick="dismissActionBanner()" title="Close">&times;</button>
      </div>
    </div>
  `;
}

function dismissActionBanner() {
  if (currentActionData) {
    dismissedActionTime = currentActionData.created_at;
  }
  const container = document.getElementById('action-banner-wrapper');
  if (container) container.innerHTML = '';
}

// ── Interactive Calendar Modal Scheduling Logic ──
let bookedDates = [];
let selectedDateStr = null;
let selectedTimeStr = null;
let currentCalDate = new Date();

async function fetchBookedDates() {
  try {
    const r = await fetch(`/api/agents/${AGENT_ID}/booked-dates`);
    if (r.ok) {
      const data = await r.json();
      bookedDates = data.booked_dates || [];
    }
  } catch(e) {
    console.error("Failed to fetch booked dates", e);
  }
}

function closeMeetingCalendarModal() {
  const modal = document.getElementById('meeting-calendar-modal');
  if (modal) {
    modal.classList.remove('active');
    setTimeout(() => {
      modal.style.display = 'none';
    }, 300);
  }
}

async function openMeetingCalendarModal(phone) {
  let modal = document.getElementById('meeting-calendar-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'meeting-calendar-modal';
    modal.className = 'meeting-modal-overlay';
    
    if (!document.getElementById('meeting-modal-styles')) {
      const styles = document.createElement('style');
      styles.id = 'meeting-modal-styles';
      styles.innerHTML = `
        .meeting-modal-overlay {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background: rgba(0, 0, 0, 0.7);
          backdrop-filter: blur(8px);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 100000;
          opacity: 0;
          transition: opacity 0.3s ease;
          font-family: 'Outfit', 'Inter', sans-serif;
        }
        .meeting-modal-overlay.active {
          opacity: 1;
        }
        .meeting-modal-card {
          background: #18181b;
          border: 1px solid #27272a;
          border-radius: 16px;
          width: 90%;
          max-width: 440px;
          padding: 24px;
          color: #f4f4f5;
          box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
          transform: scale(0.95);
          transition: transform 0.3s ease;
          display: flex;
          flex-direction: column;
          gap: 16px;
        }
        .meeting-modal-overlay.active .meeting-modal-card {
          transform: scale(1);
        }
        .modal-title {

    const waMessage = `Hello, I would like to schedule a meeting.\n\n👤 Name: ${nameVal}\n📅 Date: ${dateFormatted}\n⏰ Time: ${selectedTimeStr}`;

  modal.style.display = 'flex';

}

// ── File Attachment State ──
let _pendingFile = null; // { file, extracted_text, file_type, display_name, preview_data_url }

function handleFileSelected(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const MB = 1024 * 1024;
  if (file.size > 20 * MB) {
    toast('❌ File too large — maximum 20MB allowed', 'err');
    input.value = '';
    return;
  }
  _pendingFile = { file, extracted_text: null, file_type: 'pending', display_name: file.name };
  showFilePreview(file);
  input.value = '';
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','bmp'].includes(ext)) return '🖼️';
  if (ext === 'pdf') return '📑';
  if (['docx','doc'].includes(ext)) return '📝';
  if (['csv','xlsx'].includes(ext)) return '📊';
  if (['mp4','webm','mov','avi'].includes(ext)) return '🎬';
  if (['txt','md'].includes(ext)) return '📃';
  return '📎';
}

function showFilePreview(file) {
  const strip = document.getElementById('file-preview-strip');
  const nameEl = document.getElementById('file-preview-name');
  const statusEl = document.getElementById('file-preview-status');
  const iconEl = document.getElementById('file-preview-icon');
  const thumbEl = document.getElementById('file-preview-thumb');
  nameEl.textContent = file.name;
  statusEl.textContent = 'Ready to send';
  iconEl.textContent = getFileIcon(file.name);
  iconEl.style.display = 'flex';
  thumbEl.style.display = 'none';
  // Show image thumbnail if image
  const ext = file.name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','bmp'].includes(ext)) {
    const reader = new FileReader();
    reader.onload = (e) => {
      thumbEl.src = e.target.result;
      thumbEl.style.display = 'block';
      iconEl.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
  strip.style.display = 'flex';
}

function clearFileAttachment() {
  _pendingFile = null;
  const strip = document.getElementById('file-preview-strip');
  if (strip) strip.style.display = 'none';
  const thumbEl = document.getElementById('file-preview-thumb');
  if (thumbEl) { thumbEl.src = ''; thumbEl.style.display = 'none'; }
}

async function uploadPendingFile() {
  if (!_pendingFile || !_pendingFile.file) return null;
  const statusEl = document.getElementById('file-preview-status');
  if (statusEl) statusEl.textContent = 'Uploading…';
  const formData = new FormData();
  formData.append('file', _pendingFile.file, _pendingFile.display_name);
  try {
    const r = await fetch(BACKEND_URL + `/api/agents/${AGENT_ID}/upload-chat-file`, {
      method: 'POST',
      body: formData
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || 'Upload failed');
    }
    const data = await r.json();
    if (statusEl) statusEl.textContent = '✅ Uploaded';
    return data.extracted_text || null;
  } catch (e) {
    if (statusEl) statusEl.textContent = `❌ ${e.message}`;
    toast(`❌ File upload failed: ${e.message}`, 'err');
    return null;
  }
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if ((!text && !_pendingFile) || isTyping) return;
  inp.value = ''; autoResize(inp); isTyping = true;
  // Upload file if pending
  let fileContext = null;
  let displayText = text;
  if (_pendingFile) {
    fileContext = await uploadPendingFile();
    const fname = _pendingFile.display_name;
    displayText = text ? `📎 ${fname}\n\n${text}` : `📎 ${fname}`;
    clearFileAttachment();
  }

  document.getElementById('hero').style.display = 'none';
  appendMessage('user', displayText);
  const typing = appendTyping();

  if (chatMode === 'v2v') {
    startResponseTimer();
  }

  const history = [];
  document.querySelectorAll('.msg-wrap:not(.typing-wrap)').forEach(m => {
    history.push({role: m.classList.contains('user')?'user':'assistant', content: m.querySelector('.bubble').textContent});
  });
  try {
    const url = isPublic ? `/api/agents/${AGENT_ID}/public-ask` : `/api/agents/${AGENT_ID}/ask`;
    const bodyObj = isPublic ? {
      question: text || (fileContext ? 'I uploaded a file, please analyze it.' : ''),
      session_id: sessionId,
      device_id: deviceId,
      device_name: deviceName,
      is_voice: chatMode === 'v2v',
      file_context: fileContext || undefined
    } : {
      question: text,
      history: history.slice(-6),
      is_voice: chatMode === 'v2v'
    };
    const r = await fetch(BACKEND_URL + url, { method:'POST', headers:hdrs(), body:JSON.stringify(bodyObj) });
    const d = await r.json();
    stopResponseTimer();
    removeTyping(typing);

    if (d.suggested_questions && d.suggested_questions.length > 0) {
      currentSuggestions = (d.suggested_questions || []).map(q => ({ text: q, isAi: true }));
      updateSuggestionsUI();
    }
    if (d.action_button) {
      renderActionBanner(d.action_button);
    }

    const ans = d.answer || 'No response.';
    const enNamePrompt = "\n\nBy the way, what is your name?";
    const hiNamePromptActual = "\n\nवैसे, आपका नाम क्या है?";
    const enPhoneMarker = "! Could you also share your mobile number?";
    const hiPhoneMarker = "! क्या आप अपना मोबाइल नंबर भी शेयर कर सकते हैं?";
    const enPhonePrompt = "\n\nCould you also share your mobile number?";
    const hiPhonePrompt = "\n\nक्या आप अपना मोबाइल नंबर भी शेयर कर सकते हैं?";

    if (ans.includes(enNamePrompt)) {
      const parts = ans.split(enNamePrompt);
      appendMessage('assistant', parts[0], d.sources || []);
      setTimeout(() => {
        appendMessage('assistant', "By the way, what is your name?");
      }, 600);
      if(chatMode === 'v2v') speakText(ans);
    } else if (ans.includes(hiNamePromptActual)) {
      const parts = ans.split(hiNamePromptActual);
      appendMessage('assistant', parts[0], d.sources || []);
      setTimeout(() => {
        appendMessage('assistant', "वैसे, आपका नाम क्या है?");
      }, 600);
      if(chatMode === 'v2v') speakText(ans);
    } else if (ans.includes(enPhoneMarker)) {
      const parts = ans.split(enPhoneMarker);
      appendMessage('assistant', parts[0] + "!", d.sources || []);
      setTimeout(() => {
        appendMessage('assistant', "Could you also share your mobile number?");
      }, 600);
      if(chatMode === 'v2v') speakText(ans);
    } else if (ans.includes(hiPhoneMarker)) {
      const parts = ans.split(hiPhoneMarker);
      appendMessage('assistant', parts[0] + "!", d.sources || []);
      setTimeout(() => {
        appendMessage('assistant', "क्या आप अपना मोबाइल नंबर भी शेयर कर सकते हैं?");
      }, 600);
      if(chatMode === 'v2v') speakText(ans);
    } else if (ans.includes(enPhonePrompt)) {
      const parts = ans.split(enPhonePrompt);
      appendMessage('assistant', parts[0], d.sources || []);
      setTimeout(() => {
        appendMessage('assistant', "Could you also share your mobile number?");
      }, 600);
      if(chatMode === 'v2v') speakText(ans);
    } else if (ans.includes(hiPhonePrompt)) {
      const parts = ans.split(hiPhonePrompt);
      appendMessage('assistant', parts[0], d.sources || []);
      setTimeout(() => {
        appendMessage('assistant', "क्या आप अपना मोबाइल नंबर भी शेयर कर सकते हैं?");
      }, 600);
      if(chatMode === 'v2v') speakText(ans);
    } else {
      appendMessage('assistant', ans, d.sources || []);
      if(chatMode === 'v2v') speakText(ans);
    }
  } catch(e) { stopResponseTimer(); removeTyping(typing); toast('❌ Send failed', 'err'); } finally { isTyping = false; }
}

function appendMessage(role, text, srcs) {
  const area = document.getElementById('msg-area');
  const div = document.createElement('div');
  div.className = 'msg-wrap ' + role;
  let sHtml = '';
  if(srcs && srcs.length) sHtml = '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">' + srcs.slice(0,2).map(s=>`<span style="font-size:10px;background:rgba(255,122,0,0.1);padding:3px 8px;border-radius:6px;color:var(--accent);border:1px solid rgba(255,122,0,0.2)">📎 ${esc(s.source_name||s.filename)}</span>`).join('') + '</div>';
  const icon = role === 'user' ? '<i data-lucide="user"></i>' : '<i data-lucide="bot"></i>';
  
  // Set bubble-box with full flex to take full width of container
  div.innerHTML = `<div class="msg-icon ${role}">${icon}</div><div class="bubble-box" style="flex:1; min-width:0"><div class="bubble">${esc(text)}</div>${sHtml}</div>`;
  area.appendChild(div);
  
  // Truncate long assistant replies (greater than 5-6 lines) and add Read More link
  if (role === 'assistant') {
    const bubbleEl = div.querySelector('.bubble');
    // ~6 lines height limit is ~150px
    if (bubbleEl.scrollHeight > 150) {
      bubbleEl.style.maxHeight = '135px';
      bubbleEl.style.overflow = 'hidden';
      bubbleEl.style.position = 'relative';

function cleanSpeechText(txt) {
  if(!txt) return '';
  let t = txt;
  // Replace Hindi phonetic variations of UPAVP
  t = t.replace(/एवीपी/gi, 'UPAVP');
  t = t.replace(/एबीपी/gi, 'UPAVP');
  t = t.replace(/यूपीएवीपी/gi, 'UPAVP');
  t = t.replace(/यू पी ए वी पी/gi, 'UPAVP');
  // Lowercase/uppercase English variants
  t = t.replace(/upavp/gi, 'UPAVP');
  t = t.replace(/up avp/gi, 'UPAVP');
  t = t.replace(/yupvp/gi, 'UPAVP');
  // Brand name corrections
  t = t.replace(/the dean technology/gi, 'Diin Technology');
  t = t.replace(/dean technology/gi, 'Diin Technology');
  t = t.replace(/diin technology/gi, 'Diin Technology');
  return t;
}

function showSubtitles(text, delayPerWord) {
  const trans = document.getElementById('vo-transcript');
  if (!trans) return;
  clearInterval(subtitleInterval);
  
  const cleanTxt = cleanSpeechText(text);
  const words = cleanTxt.split(/\s+/).filter(w => w.trim().length > 0);
  if (words.length === 0) return;
  
  let currentIdx = 0;
  trans.innerHTML = '';
  
  const delay = delayPerWord || 400; // Fallback to 400ms if not provided
  
  subtitleInterval = setInterval(() => {
    if (currentIdx < words.length) {
      trans.innerHTML = words.slice(0, currentIdx + 1).join(' ');
      currentIdx++;
    } else {
      clearInterval(subtitleInterval);
    }
  }, delay);
}

function removeSentenceRestarts(text) {
  if (!text) return '';
  text = text.replace(/\s+/g, ' ').trim();
  
  // List of common query starters (English and Hindi/Hinglish)
  const starters = [
    'who is', 'what is', 'where is', 'how is', 'why is', 'tell me', 'can you', 'do you', 'show me', 'how to',
    'what are', 'who are', 'who was', 'what was', 'where was',
    'कौन है', 'क्या है', 'कहाँ है', 'कैसे', 'क्यों', 'बताओ', 'दिखाओ', 'naam kya', 'kya hai', 'kaun hai', 'kaha hai'
  ];
  
  const lower = text.toLowerCase();
  for (let starter of starters) {
    const idx = lower.lastIndexOf(starter);
    if (idx > 0) {
      // If the starter appears again later in the string, keep only from that last occurrence
      return text.substring(idx);
    }
  }
  return text;
}

function cleanMixedScript(text) {
  if (!text) return '';
  const hasLatin = /[a-zA-Z]/.test(text);
  const hasDevanagari = /[\u0900-\u097F]/.test(text);
  
  if (hasLatin && hasDevanagari) {
    // Transliterate Devanagari characters to English phonetics
    const devanagariMap = {
      'अ': 'a', 'आ': 'aa', 'इ': 'i', 'ई': 'ee', 'उ': 'u', 'ऊ': 'oo', 'ऋ': 'ri', 'ए': 'e', 'ऐ': 'ai', 'ओ': 'o', 'औ': 'au',
      'क': 'k', 'ख': 'kh', 'ग': 'g', 'घ': 'gh', 'ङ': 'ng',
      'च': 'ch', 'छ': 'chh', 'ज': 'j', 'झ': 'jh', 'ञ': 'ny',
      'ट': 't', 'ठ': 'th', 'ड': 'd', 'ढ': 'dh', 'ण': 'n',
      'त': 't', 'थ': 'th', 'द': 'd', 'ध': 'dh', 'न': 'n',
      'प': 'p', 'फ': 'ph', 'ब': 'b', 'भ': 'bh', 'म': 'm',
      'य': 'y', 'र': 'r', 'ल': 'l', 'व': 'v', 'श': 'sh', 'ष': 'sh', 'स': 's', 'ह': 'h',
      'ा': 'a', 'ि': 'i', 'ी': 'ee', 'ु': 'u', 'ू': 'oo', 'ृ': 'ri', 'े': 'e', 'ै': 'ai', 'ो': 'o', 'ौ': 'au', 'ं': 'n', '्': '',
      '।': '.'
    };
    let out = '';
    for (let char of text) {
      out += devanagariMap[char] || char;
    }
    return out;
  }
  return text;
}

function deduplicateText(text) {
  if (!text) return "";
  text = text.replace(/\s+/g, ' ').trim();
  
  function cleanStr(str) {
    // Keep Unicode letters (including Hindi Devanagari) and digits
    return str.toLowerCase().replace(/[^\p{L}\d]/gu, '');
  }
  
  let words = text.split(' ');
  if (words.length <= 1) return text;
  
  // Try to find a split point where the left part and the right part are phonetically identical
  for (let i = 1; i < words.length; i++) {
    let part1 = words.slice(0, i).join(' ');
    let part2 = words.slice(i).join(' ');
    
    let c1 = cleanStr(part1);
    let c2 = cleanStr(part2);
    
    if (c1 === c2 && c1.length > 2) {
      return part1;
    }
  }
  
  // Check for sliding window phrase repetitions
  for (let len = Math.floor(words.length / 2); len >= 1; len--) {
    for (let i = 0; i <= words.length - 2 * len; i++) {
      let w1 = words.slice(i, i + len).join(' ');
      let w2 = words.slice(i + len, i + 2 * len).join(' ');
      if (cleanStr(w1) === cleanStr(w2) && cleanStr(w1).length > 1) {
        words.splice(i + len, len);
        return words.join(' ');
      }
    }
  }
  
  return text;
}

function resetSilenceTimer() {
  clearTimeout(silenceTimer);
  
  // 1.5 seconds of silence means user has finished speaking
  silenceTimer = setTimeout(() => {
    const rawCleaned = cleanSpeechText(speechTranscript);
    const finalCleaned = cleanMixedScript(deduplicateText(removeSentenceRestarts(rawCleaned))).trim();
    if (finalCleaned) {
      console.log("Silence detected. Sending message:", finalCleaned);
      
      const trans = document.getElementById('vo-transcript');
      trans.innerHTML = `<b>${finalCleaned}</b>`;
      document.getElementById('chat-input').value = finalCleaned;
      
      isListening = false;
      document.getElementById('vo-btn').classList.remove('active');
      document.getElementById('vo-orb').classList.remove('listening');
      document.getElementById('vo-status').textContent = 'Processing…';
      
      stopRecognition();
      sendMsg();
    }
  }, 1500);
}

function startRecognition() {
  const trans = document.getElementById('vo-transcript');
  if (dgSocket) {
    try { dgSocket.close(); } catch(e){}
  }
  
  speechTranscript = '';
  currentInterim = '';
  clearTimeout(silenceTimer);
  
  const loc = window.location;
  let wsProto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  let wsUrl = wsProto + '//' + loc.host + '/api/agents/ws/transcribe';
  if (typeof BACKEND_URL !== 'undefined' && BACKEND_URL) {
    const cleanUrl = BACKEND_URL.replace(/^https?:\/\//, '').replace(/\/$/, '');
    if (BACKEND_URL.startsWith('https://')) wsProto = 'wss:';
    else if (BACKEND_URL.startsWith('http://')) wsProto = 'ws:';
    wsUrl = wsProto + '//' + cleanUrl + '/api/agents/ws/transcribe';
  }
  
  dgSocket = new WebSocket(wsUrl);
  
  dgSocket.onopen = async () => {
    console.log("Deepgram WS connected!");
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ 
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          sampleRate: 48000,
          channelCount: 1
        } 
      });
      let mimeType = 'audio/webm';
      if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'audio/ogg';
      }
      
      mediaRecorder = new MediaRecorder(audioStream, { mimeType });
      
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0 && dgSocket.readyState === WebSocket.OPEN) {
          dgSocket.send(event.data);
        }
      };
      
      mediaRecorder.start(250);
      
      if (chatMode === 'v2v') {
        trans.innerHTML = `<i>Listening…</i>`;
      }
    } catch (err) {
      console.error("Mic access denied or error:", err);
      toast("❌ Microphone access denied", "err");
      toggleVoice();
    }
  };

  dgSocket.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      const channel = data.channel || (data.results && data.results.channels && data.results.channels[0]);
      if (!channel) return;
      
      const alternatives = channel.alternatives || [];
      if (alternatives.length === 0) return;
      
      const transcript = alternatives[0].transcript || '';
      const isFinal = data.is_final;
      
      if (transcript.trim()) {
        resetSilenceTimer();
        
        // Barge-In Interruption: if user starts speaking while bot speaks, stop speaking instantly!
        if (window.currentAudio || (window.speechSynthesis && window.speechSynthesis.speaking)) {
          console.log("Barge-In detected! User started speaking. Interrupting bot voice...");
          if (window.currentAudio) {
            window.currentAudio.pause();
            window.currentAudio = null;
          }
          if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
          }
          clearInterval(subtitleInterval);
          const status = document.getElementById('vo-status');
          if (chatMode === 'v2v') {
            status.textContent = 'Listening…';
          }
        }
        
        if (isFinal) {
          speechTranscript += (speechTranscript ? ' ' : '') + transcript;
          currentInterim = '';
        } else {
          currentInterim = transcript;
        }
        
        const rawDisplay = cleanSpeechText(speechTranscript + (currentInterim ? ' ' + currentInterim : ''));
        const display = cleanMixedScript(deduplicateText(removeSentenceRestarts(rawDisplay)));
        trans.innerHTML = `<span>${display}</span>`;
      }
    } catch (e) {
      console.error("Error parsing Deepgram message:", e);
    }
  };

  dgSocket.onerror = (e) => {
    console.error("Deepgram WS error:", e);
  };

  dgSocket.onclose = () => {
    console.log("Deepgram WS connection closed.");
  };
}

function stopRecognition() {
  clearTimeout(silenceTimer);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    try { mediaRecorder.stop(); } catch(e){}
  }
  if (audioStream) {
    audioStream.getTracks().forEach(track => track.stop());
  }
  if (dgSocket) {
    try {
      dgSocket.send(JSON.stringify({ type: 'stop' }));
      dgSocket.close();
    } catch(e){}
    dgSocket = null;
  }
}

async function speakText(text) {
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  clearInterval(subtitleInterval);
  
  const status = document.getElementById('vo-status');
  if(chatMode === 'v2v') {
    status.textContent = 'Speaking…';
  }

  const cfg = _agentData.voice_config || {};
  const provider = (cfg.provider || 'mrai').toLowerCase();
  
  if (provider === 'elevenlabs' || provider === 'sarvam') {
    // Stop local speech first
    window.speechSynthesis?.cancel();
    
    // Play backend audio stream
    const audioUrl = BACKEND_URL + `/api/agents/${AGENT_ID}/speak?text=${encodeURIComponent(text)}`;
    if (window.currentAudio) {
      window.currentAudio.pause();
      window.currentAudio = null;
    }
    const audio = new Audio(audioUrl);
    window.currentAudio = audio;
    
    audio.onplaying = () => {
      if(chatMode === 'v2v') {
        const words = cleanSpeechText(text).split(/\s+/).filter(w => w.trim().length > 0);
        let delay = 400;
        if (audio.duration && isFinite(audio.duration)) {
          const totalMs = Math.max(0, (audio.duration * 1000) - 200);
          delay = totalMs / words.length;
        }
        showSubtitles(text, delay);
        
        // Turn microphone back on during play so user can interrupt (Barge-In)
        isListening = true;
        document.getElementById('vo-btn').classList.add('active');
        document.getElementById('vo-orb').classList.add('listening');
        startRecognition();
      }
    };

    audio.onended = () => {
      clearInterval(subtitleInterval);
      if(chatMode === 'v2v') {
        status.textContent = 'Listening…';
      }
    };
    
    audio.onerror = (e) => {
      clearInterval(subtitleInterval);
      console.warn("Backend TTS audio failed...", e);
      toast('⚠️ Voice output failed. Check your API key or quota.', 'err');
      if(chatMode === 'v2v') {
        status.textContent = 'Listening…';
        isListening = true;
        document.getElementById('vo-btn').classList.add('active');
        document.getElementById('vo-orb').classList.add('listening');
        startRecognition();
      }
    };
    
    audio.play().catch(err => {
      clearInterval(subtitleInterval);
      console.warn("Audio play failed...", err);
      toast('⚠️ Voice output failed. Check your API key or quota.', 'err');
      if(chatMode === 'v2v') {
        status.textContent = 'Listening…';
        isListening = true;
        document.getElementById('vo-btn').classList.add('active');
        document.getElementById('vo-orb').classList.add('listening');
        startRecognition();
      }
    });
  } else {
    speakLocalSpeech(text);
  }
}

function speakLocalSpeech(text) {
  const status = document.getElementById('vo-status');
  const u = new SpeechSynthesisUtterance(text);
  const cfg = _agentData.voice_config || {};
  const voiceName = (cfg.voice_name || '').toLowerCase();
  const voices = speechSynthesis.getVoices();
  const isHindi = text.match(/[\u0900-\u097F]/);
  
  let v = null;
  if (voices.length > 0) {
    if (voiceName) {
      v = voices.find(vo => vo.name.toLowerCase().includes(voiceName) || vo.lang.toLowerCase().includes(voiceName));
      if (!v) {
        if (voiceName === 'natural') {
          v = voices.find(vo => vo.name.toLowerCase().includes('google') || vo.name.toLowerCase().includes('natural'));
        } else if (voiceName === 'friendly') {
          v = voices.find(vo => vo.name.toLowerCase().includes('zira') || vo.name.toLowerCase().includes('samantha') || vo.name.toLowerCase().includes('female'));
        } else if (voiceName === 'pro') {
          v = voices.find(vo => vo.name.toLowerCase().includes('david') || vo.name.toLowerCase().includes('mark') || vo.name.toLowerCase().includes('male'));
        }
      }
    }
    if (!v) {
      if (isHindi) v = voices.find(vo => vo.lang.startsWith('hi'));
      else v = voices.find(vo => vo.lang.startsWith('en'));
    }
  }
  
  if(v) u.voice = v;
  u.lang = isHindi ? 'hi-IN' : 'en-US';
  u.rate = 1.0;
  
  u.onstart = () => {
    if(chatMode === 'v2v') {
      showSubtitles(text, 380);
      isListening = true;
      document.getElementById('vo-btn').classList.add('active');
      document.getElementById('vo-orb').classList.add('listening');
      startRecognition();
    }
  };
  
  u.onend = () => {
    clearInterval(subtitleInterval);
    if(chatMode === 'v2v') {
      status.textContent = 'Listening…';
    }
  };

  speechSynthesis.speak(u);
}

let currentSuggestions = [];

function renderSuggestions(qaPairs) {
  const bar = document.getElementById('suggestions-bar');
  if (!bar) return;
  
  // Take first 5 suggestions
  currentSuggestions = (qaPairs || []).slice(0, 5).map(p => ({ text: p.q, isAi: false }));
  if (!currentSuggestions.length) {
    bar.style.display = 'none';
    return;
  }

  updateSuggestionsUI();
}

function updateSuggestionsUI() {
  const bar = document.getElementById('suggestions-bar');
  if (!bar) return;

  if (!currentSuggestions.length) {
    bar.style.display = 'none';
    return;
  }

  bar.innerHTML = currentSuggestions.map((item, idx) => {
    const qText = typeof item === 'object' ? item.text : item;
    const isAi = typeof item === 'object' ? item.isAi : false;
    const chipClass = isAi ? 'suggestion-chip ai-suggested' : 'suggestion-chip';
    return `<div class="${chipClass}" onclick="clickSuggestion('${esc(qText)}', ${idx})">${esc(qText)}</div>`;
  }).join('');
  bar.style.display = 'flex';
}

function clickSuggestion(questionText, idx) {
  currentSuggestions.splice(idx, 1);
  updateSuggestionsUI();

  const inp = document.getElementById('chat-input');
  if (inp) {
    inp.value = questionText;
    sendMsg();
  }
}

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const res = await r.json();
    if (!r.ok) throw new Error(res.detail || 'Submission failed');

    if (typeof showToast === 'function') {
      showToast('Thank you! Submitted successfully.', 'success');
    } else {
      alert('Thank you! Submitted successfully.');
    }
    closeFeedbackModal();
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = oldText;
  }
}

loadAgent();
</script>

<!-- Feedback & Report Modal -->
<div class="modal-overlay" id="feedback-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="fb-modal-title">Share Feedback / Report Agent</div>
      <button class="modal-close" onclick="closeFeedbackModal()"><i data-lucide="x" style="width:20px;height:20px"></i></button>
    </div>
    
    <div class="form-group">
      <label class="form-label">Type</label>
      <div class="type-toggle-group">
        <button class="type-btn active" id="type-btn-feedback" onclick="setFeedbackType('feedback')"><i data-lucide="message-square" style="width:14px;height:14px"></i> Feedback</button>
        <button class="type-btn" id="type-btn-report" onclick="setFeedbackType('report')"><i data-lucide="alert-triangle" style="width:14px;height:14px"></i> Report</button>
      </div>
    </div>

    <div class="form-group" id="fb-rating-group">
      <label class="form-label">Rating</label>
      <div class="star-rating" id="fb-star-rating">
        <i data-lucide="star" data-val="1"></i>
        <i data-lucide="star" data-val="2"></i>
        <i data-lucide="star" data-val="3"></i>
        <i data-lucide="star" data-val="4"></i>
        <i data-lucide="star" data-val="5"></i>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Your Name (Optional)</label>
      <input type="text" class="form-input" id="fb-user-name" placeholder="e.g. John Doe">
    </div>

    <div class="form-group">
      <label class="form-label">Your Email (Optional)</label>
      <input type="email" class="form-input" id="fb-user-email" placeholder="e.g. john@example.com">
    </div>

    <div class="form-group">
      <label class="form-label" id="fb-comment-label">Feedback Message</label>
      <textarea class="form-input" id="fb-comment" style="height:100px; resize:none" placeholder="Write your experience or concerns..."></textarea>
    </div>

    <button class="submit-btn" id="fb-submit-btn" onclick="submitFeedback()">Submit Feedback</button>
  </div>
</div>

<script>
// Re-trigger lucide icons since we added new elements to the DOM
if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
